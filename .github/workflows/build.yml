name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Dependencias del sistema
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip openjdk-17-jdk git

      # 4. Buildozer
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy

      # 5. Android SDK (LIMPIO Y CORRECTO)
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip -d cmdline-tools-temp

          mkdir -p cmdline-tools/latest
          mv cmdline-tools-temp/cmdline-tools/* cmdline-tools/latest/

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV

      # 6. Licencias
      - name: Accept licenses
        run: yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses || true

      # 7. SDK packages (FIX AIDL)
      - name: Install Android packages
        run: |
          sdkmanager --sdk_root=$HOME/android-sdk "platform-tools"
          sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33"
          sdkmanager --sdk_root=$HOME/android-sdk "build-tools;33.0.2"

      # 8. Build APK
      - name: Build APK
        run: buildozer -v android debug
        env:
          ANDROID_HOME: $HOME/android-sdk
          ANDROIDSDK: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
