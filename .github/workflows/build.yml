name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython kivy

      # ANDROID SDK SETUP (IMPORTANTE)
      - name: Install Android SDK manually
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip openjdk-17-jdk

          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip
          mv cmdline-tools cmdline-tools/latest

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_ENV

      # Accept licenses
      - name: Accept licenses
        run: yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses || true

      # Install required packages (FIX AIDL)
      - name: Install Android packages
        run: |
          sdkmanager --sdk_root=$HOME/android-sdk "platform-tools"
          sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33"
          sdkmanager --sdk_root=$HOME/android-sdk "build-tools;33.0.2"

      # Build APK
      - name: Build APK
        run: buildozer -v android debug
        env:
          ANDROIDSDK: $HOME/android-sdk
          ANDROID_HOME: $HOME/android-sdk
