name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Dependencias base
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip openjdk-17-jdk git

      # 4. Instalar Buildozer
      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy

      # 5. Instalar Android SDK manual (FIX AIDL)
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip

          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_ENV

      # 6. Licencias
      - name: Accept licenses
        run: yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses || true

      # 7. Instalar SDK (IMPORTANTE: FIX AIDL)
      - name: Install Android packages
        run: |
          sdkmanager --sdk_root=$HOME/android-sdk "platform-tools"
          sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33"
          sdkmanager --sdk_root=$HOME/android-sdk "build-tools;33.0.2"

      # 8. 🔍 DEBUG REAL (esto te muestra el error verdadero)
      - name: Debug environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -R $HOME/android-sdk || true
          sdkmanager --list || true

      # 9. Build APK (VERBOSE)
      - name: Build APK
        run: buildozer -v android debug
        env:
          ANDROIDSDK: $HOME/android-sdk
          ANDROID_HOME: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
