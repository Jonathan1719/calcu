name: Build Android APK (ULTRA STABLE)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_HOME: /opt/android-sdk

    steps:
      # 1. Código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Sistema base (evita tar, zip, sdkmanager issues)
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget curl tar \
            openjdk-17-jdk \
            build-essential

      # 4. Python tools
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir buildozer cython setuptools wheel

      # 5. Android SDK (INSTALACIÓN LIMPIA ÚNICA)
      - name: Install Android SDK
        run: |
          set -e

          sudo mkdir -p $ANDROID_SDK_ROOT
          sudo chown -R $USER:$USER $ANDROID_SDK_ROOT

          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip -q sdk.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT --update

          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # 6. Forzar Buildozer a usar ESTE SDK (clave real)
      - name: Fix Buildozer SDK path
        run: |
          mkdir -p ~/.buildozer/android/platform

          rm -rf ~/.buildozer/android/platform/android-sdk || true

          ln -s $ANDROID_SDK_ROOT ~/.buildozer/android/platform/android-sdk

      # 7. Cache (reduce fallos + acelera builds)
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}

      # 8. Build APK (VERBOSE para debug real si falla)
      - name: Build APK
        run: |
          buildozer -v android debug

      # 9. Subir APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk
