name: Build Android APK (ULTIMATE FIX)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

    steps:
      # 1. Repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Sistema base (evita tar, unzip, etc)
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget curl tar \
            openjdk-17-jdk \
            build-essential

      # 4. Buildozer + deps
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir buildozer cython setuptools wheel

      # 5. Crear SDK en ruta que espera Buildozer (IMPORTANTE)
      - name: Install Android SDK (Buildozer path)
        run: |
          set -e

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd /tmp

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip -q sdk.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

      # 6. Crear compatibilidad LEGACY (FIX TU ERROR ACTUAL)
      - name: Fix sdkmanager legacy path
        run: |
          set -e

          mkdir -p $ANDROID_SDK_ROOT/tools/bin

          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
                 $ANDROID_SDK_ROOT/tools/bin/sdkmanager

      # 7. Configurar SDK + licencias
      - name: Setup SDK and accept licenses
        run: |
          set -e

          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses
          sdkmanager --update

      # 8. Instalar herramientas ESTABLES (NO 37)
      - name: Install Android packages
        run: |
          set -e

          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # 9. Cache (acelera builds)
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}

      # 10. Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # 11. Subir APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk
