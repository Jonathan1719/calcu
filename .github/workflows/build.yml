name: Build Android APK (NO AIDL FIXED)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /home/runner/android-sdk
      ANDROID_HOME: /home/runner/android-sdk

    steps:
      # 1. Repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Sistema base (evita errores raros)
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget curl tar \
            openjdk-17-jdk \
            build-essential

          which tar
          tar --version

      # 4. Buildozer
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir buildozer cython setuptools wheel

      # 5. Android SDK limpio (SIN errores de cmdline-tools)
      - name: Install Android SDK
        run: |
          set -e

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd /tmp

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

      # 6. SDKMANAGER + licencias
      - name: Setup SDK and accept licenses
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT --update

      # 7. INSTALAR SOLO VERSIONES ESTABLES (CLAVE PARA AIDL)
      - name: Install Android packages
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # 8. FORZAR QUE BUILDOZER USE ESTE SDK (FIX AIDL REAL)
      - name: Force Buildozer SDK path
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf $ANDROID_SDK_ROOT ~/.buildozer/android/platform/android-sdk

      # 9. Cache (más rápido)
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-cache-${{ runner.os }}

      # 10. Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # 11. Subir APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk
