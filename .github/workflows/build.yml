name: Build Android APK (HARD FIX)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /home/runner/android-sdk
      ANDROID_HOME: /home/runner/android-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip wget curl tar openjdk-17-jdk build-essential

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython setuptools wheel

      # 🔥 SDK CLEAN INSTALL
      - name: Install Android SDK
        run: |
          set -e

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd /tmp

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

      - name: Setup SDK
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # 🔥 CLAVE: FORZAR BUILDOZER A USAR TU SDK
      - name: Force Buildozer SDK
        run: |
          mkdir -p ~/.buildozer/android/platform

          rm -rf ~/.buildozer/android/platform/android-sdk || true

          ln -s $ANDROID_SDK_ROOT ~/.buildozer/android/platform/android-sdk

          echo "SDK forced to external path"

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk
