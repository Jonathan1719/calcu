name: Build Android APK (FULL FIX)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

    steps:
      # 1. Repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Sistema base
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip wget curl tar openjdk-17-jdk build-essential

      # 4. Buildozer
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir buildozer cython setuptools wheel

      # 5. Instalar Android SDK (cmdline-tools correcto)
      - name: Install Android SDK
        run: |
          set -e

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd /tmp

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip -q sdk.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

      # 6. FIX CLAVE: sdkmanager legacy path (TU ERROR)
      - name: Fix sdkmanager legacy path
        run: |
          set -e

          mkdir -p $ANDROID_SDK_ROOT/tools/bin

          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
                 $ANDROID_SDK_ROOT/tools/bin/sdkmanager

          echo "sdkmanager legacy fix applied"

      # 7. Licencias SDK
      - name: Accept licenses
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses

      # 8. Instalar Android estable (NO 37)
      - name: Install Android packages
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # 9. Cache (opcional pero recomendado)
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-cache-${{ runner.os }}

      # 10. Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # 11. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk
