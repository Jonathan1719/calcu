name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ 1. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ 2. Aceptar licencias (IMPORTANTE)
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      # ✅ 3. Instalar platform tools y build tools
      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;37.0.0"

      # ✅ 4. Verificar cmdline-tools (por si falla en runners nuevos)
      - name: Ensure cmdline-tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          if [ ! -d "latest" ]; then
            wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
            unzip tools.zip -d latest
          fi

      # ✅ 5. Instalar dependencias Python (Buildozer)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy

      # ✅ 6. Build APK
      - name: Build with Buildozer
        run: |
          buildozer -v android debug
