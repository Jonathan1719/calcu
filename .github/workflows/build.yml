name: Build Android APK (Kivy Stable)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

    steps:
      # 1. Repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Sistema base
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip wget curl tar openjdk-17-jdk build-essential

      # 4. Buildozer
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir buildozer cython setuptools wheel

      # 5. Dependencias Python (CLAVE FIX)
      - name: Install Python dependencies
        run: |
          pip install kivy==2.2.1 pillow kivymd==1.2.0

      # 6. Android SDK (Buildozer lo maneja, pero aseguramos base)
      - name: Install Android SDK
        run: |
          set -e
          mkdir -p ~/.buildozer/android/platform
          cd /tmp

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip -q sdk.zip

          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mv cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/

      # 7. Licencias SDK
      - name: Accept licenses
        run: |
          export PATH=~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses

      # 8. SDK packages estables (SIN 37)
      - name: Install Android packages
        run: |
          export PATH=~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:$PATH

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      # 9. Fix Buildozer path
      - name: Force Buildozer SDK path
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf ~/.buildozer/android/platform/android-sdk \
                 ~/.buildozer/android/platform/android-sdk

      # 10. Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # 11. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk
