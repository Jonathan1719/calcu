name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      # =========================
      # 1. CODE
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. PYTHON
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # 3. SYSTEM DEPENDENCIES
      # =========================
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget curl \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            cmake build-essential \
            libffi-dev libssl-dev \
            libsqlite3-dev

      # =========================
      # 4. FORCE JAVA 17 (IMPORTANTE)
      # =========================
      - name: Set JAVA_HOME to JDK 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version

      # =========================
      # 5. ANDROID SDK
      # =========================
      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip
          unzip commandlinetools-linux-13114758_latest.zip
          mv cmdline-tools latest

          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      # =========================
      # 6. SDK PACKAGES
      # =========================
      - name: Accept SDK licenses + install packages
        run: |
          yes | sdkmanager --licenses || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # =========================
      # 7. BUILD DEPENDENCIES
      # =========================
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36 buildozer==1.5.0

      # =========================
      # 8. BUILD APK
      # =========================
      - name: Build APK
        run: |
          buildozer -v android debug
